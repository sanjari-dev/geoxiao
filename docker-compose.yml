services:
  postgres:
    image: postgres:16-alpine
    container_name: geoxiao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: geoxiao
      POSTGRES_USER: geoxiao
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - geoxiao_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoxiao -d geoxiao"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: geoxiao-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: market_data
      # Official ClickHouse image default credentials: user=default, password=<empty>.
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - geoxiao_clickhouse_data:/var/lib/clickhouse
      - geoxiao_clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://localhost:8123/?query=SELECT%201' | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  geoxiao_postgres_data:
  geoxiao_clickhouse_data:
  geoxiao_clickhouse_logs:
